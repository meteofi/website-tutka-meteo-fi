name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx eslint src/

      - run: npm run build
        env:
          NODE_ENV: production

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
